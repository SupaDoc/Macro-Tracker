[build]
  publish = "."
  functions = "netlify/functions"
  # Generates config.js from the SUPABASE_URL / SUPABASE_ANON_KEY env vars set
  # in Netlify site settings, since config.js is gitignored and there's no
  # other build step. See config.example.js for the shape.
  command = "node scripts/write-config.js"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  # SPA fallback — safe because /.netlify/functions/* is matched first by Netlify.
