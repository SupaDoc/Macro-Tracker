[build]
  publish = "."
  functions = "netlify/functions"
  # No build command: config.js is committed directly (see config.js for why),
  # and this is otherwise a static site with no build tooling. An earlier
  # version generated config.js here from env vars via scripts/write-config.js,
  # but that script exits non-zero when the env vars aren't visible in a given
  # deploy context (e.g. deploy-preview), which fails the whole build before
  # it ever reaches the publish step — worse than just committing the file.

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  # SPA fallback — safe because /.netlify/functions/* is matched first by Netlify.
